name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass
          MYSQL_DATABASE: plants
          MYSQL_USER: devuser
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -ppass || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Restore Playwright browsers cache so we don't have to download them every time
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

  backend-unit:
    runs-on: ubuntu-latest
    working-directory: server
    steps:
      - uses: actions/checkout@v4
      - run: npm run test:unit
  
  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run test:unit
  
  integration:
    needs: [test, backend-unit, frontend-unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run initialize
      - run: npm run test:integration
  
  playwright: 
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps: 
      - run: npx playwright install --with-deps
      - run: npm run test:e2e